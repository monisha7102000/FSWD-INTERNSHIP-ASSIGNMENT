<!DOCTYPE html>
<html>
<head>
    <title>Client-Server Architecture</title>
    <link rel="stylesheet" href="clint-server.css">
</head>
<body>

    <h1>Assignment 1 - Internet Explorer</h1>

    <div class="container">
        <h2>Client-Server Architecture</h2>

        <div class="diagram">
            <div class="box client">CLIENT</div>
            <div class="box server">SERVER</div>
            <div class="request">Request →</div>
            <div class="response">← Response</div>
        </div>

        <ul>
            <li>Client sends a request.</li>
            <li>Server processes it.</li>
            <li>Server sends response.</li>
            <li>Client displays webpage.</li>
        </ul>
    </div>

</body>
</html>
